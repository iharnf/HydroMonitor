substitutions:
  device_name: hydromonitor
  friendly_name: HydroMonitor
  ph_adc_pin: GPIO36
  display_spi_clk: GPIO13
  display_spi_mosi: GPIO15
  display_cs: GPIO5
  display_dc: GPIO14
  display_reset: GPIO12
  setup_ap_password: hydromonitor

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "HydroMonitor display test firmware, v0.1.3"
  project:
    name: hydromonitor.ph_monitor
    version: "0.1.3"

esp32:
  board: m5stick-c
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HydroMonitor Setup"
    password: ${setup_ap_password}

captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: true
  local: true

time:
  - platform: homeassistant
    id: homeassistant_time

spi:
  clk_pin: ${display_spi_clk}
  mosi_pin: ${display_spi_mosi}

font:
  - file: "gfonts://Roboto Condensed"
    id: font_title
    size: 16
    glyphs: " !\"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Roboto Condensed"
    id: font_label
    size: 18
    glyphs: " !\"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Roboto Condensed"
    id: font_value
    size: 28
    glyphs: " !\"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Roboto Condensed"
    id: font_ph
    size: 56
    glyphs: " -.0123456789"

color:
  - id: color_bg
    red: 0%
    green: 0%
    blue: 0%
  - id: color_text
    red: 100%
    green: 100%
    blue: 100%
  - id: color_muted
    red: 55%
    green: 61%
    blue: 67%
  - id: color_ok
    red: 23%
    green: 85%
    blue: 45%

globals:
  - id: ph_ready
    type: bool
    restore_value: no
    initial_value: "false"

sensor:
  - platform: adc
    id: ph_probe_voltage
    name: "Probe Voltage"
    pin: ${ph_adc_pin}
    attenuation: 12db
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "mV"
    device_class: voltage
    state_class: measurement
    filters:
      - median:
          window_size: 7
          send_every: 3
          send_first_at: 1
      - sliding_window_moving_average:
          window_size: 20
          send_every: 5
          send_first_at: 1
      - lambda: return x * 1000.0;

  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi RSSI"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    id: device_uptime
    name: "Uptime"
    update_interval: 60s
    entity_category: diagnostic

  # DS18B20 будет добавлен в v0.3.0.
  # План подключения:
  #   DATA -> GPIO32
  #   VCC  -> 5V
  #   GND  -> GND
  #   резистор 4.7 кОм между DATA и VCC
  #
  # - platform: dallas_temp
  #   id: water_temperature
  #   name: "Water Temperature"
  #   update_interval: 30s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic

binary_sensor:
  - platform: status
    name: "Status"

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

  - platform: template
    name: "Calibration Placeholder"
    entity_category: config
    on_press:
      - logger.log: "Calibration will be implemented in v0.2.0 after real mV values are verified."

interval:
  - interval: 10s
    then:
      - logger.log:
          format: "HydroMonitor alive. Probe voltage: %.0f mV"
          args: [ 'id(ph_probe_voltage).state' ]

display:
  - platform: st7789v
    id: lcd
    model: TTGO TDisplay 135x240
    cs_pin: ${display_cs}
    dc_pin: ${display_dc}
    reset_pin: ${display_reset}
    backlight_pin: ${display_backlight}
    rotation: 270
    update_interval: 1s
    lambda: |-
      it.fill(id(color_bg));

      it.printf(120, 4, id(font_title), id(color_muted), TextAlign::TOP_CENTER, "HYDROMONITOR");
      it.printf(120, 23, id(font_ph), id(color_muted), TextAlign::TOP_CENTER, "--.--");

      it.printf(16, 88, id(font_label), id(color_muted), TextAlign::TOP_LEFT, "Probe");
      if (id(ph_probe_voltage).has_state()) {
        it.printf(224, 82, id(font_value), id(color_text), TextAlign::TOP_RIGHT, "%.0f mV", id(ph_probe_voltage).state);
      } else {
        it.printf(224, 82, id(font_value), id(color_text), TextAlign::TOP_RIGHT, "---- mV");
      }

      if (id(wifi_rssi).has_state()) {
        int bars = 1;
        if (id(wifi_rssi).state > -55) {
          bars = 4;
        } else if (id(wifi_rssi).state > -67) {
          bars = 3;
        } else if (id(wifi_rssi).state > -78) {
          bars = 2;
        }
        it.printf(16, 132, id(font_label), id(color_text), TextAlign::BOTTOM_LEFT, "WiFi %d/4", bars);
      } else {
        it.printf(16, 132, id(font_label), id(color_muted), TextAlign::BOTTOM_LEFT, "WiFi --");
      }

      it.printf(224, 132, id(font_label), id(color_ok), TextAlign::BOTTOM_RIGHT, "USB");
