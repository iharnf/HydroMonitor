substitutions:
  device_name: hydromonitor
  friendly_name: HydroMonitor
  ph_adc_pin: GPIO36
  setup_ap_password: hydromonitor

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "HydroMonitor display test firmware, v0.1.3"
  project:
    name: hydromonitor.ph_monitor
    version: "0.1.3"
  # Удержание питания: GPIO4 должен быть высоким для работы M5StickC Plus2
  on_boot:
    priority: -100
    then:
      - output.turn_on: power_hold

esp32:
  board: m5stick-c
  framework:
    type: arduino

# Выход для поддержания питания
output:
  - platform: gpio
    pin: GPIO4
    id: power_hold

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HydroMonitor Setup"
    password: ${setup_ap_password}

captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: true
  local: true

# Пины для дисплея ST7789v2
spi:
  clk_pin: GPIO13
  mosi_pin: GPIO15

font:
  - file: "gfonts://Roboto Condensed"
    id: font_title
    size: 16
    glyphs: " !\"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Roboto Condensed"
    id: font_label
    size: 18
    glyphs: " !\"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Roboto Condensed"
    id: font_value
    size: 28
    glyphs: " !\"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Roboto Condensed"
    id: font_ph
    size: 56
    glyphs: " -.0123456789"

color:
  - id: color_bg
    red: 0%
    green: 0%
    blue: 0%
  - id: color_text
    red: 100%
    green: 100%
    blue: 100%
  - id: color_muted
    red: 55%
    green: 61%
    blue: 67%
  - id: color_ok
    red: 23%
    green: 85%
    blue: 45%

sensor:
  - platform: adc
    id: ph_probe_voltage
    name: "Probe Voltage"
    pin: ${ph_adc_pin}
    attenuation: 12db
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "mV"
    device_class: voltage
    state_class: measurement
    filters:
      - median:
          window_size: 7
      - sliding_window_moving_average:
          window_size: 20
      - lambda: return x * 1000.0;
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi RSSI"
    update_interval: 60s
    entity_category: diagnostic

display:
  - platform: st7789v
    id: lcd
    model: Custom
    # Распиновка дисплея для M5StickC Plus2
    cs_pin: GPIO5
    dc_pin: GPIO14
    reset_pin: GPIO12
    backlight_pin: GPIO27
    width: 135
    height: 240
    offset_width: 52
    offset_height: 40
    rotation: 270
    update_interval: 1s
    lambda: |-
      it.fill(id(color_bg));
      it.printf(67, 4, id(font_title), id(color_muted), TextAlign::TOP_CENTER, "HYDROMONITOR");

      if (id(ph_probe_voltage).has_state()) {
        it.printf(67, 23, id(font_ph), id(color_text), TextAlign::TOP_CENTER, "%.0f", id(ph_probe_voltage).state);
      } else {
        it.printf(67, 23, id(font_ph), id(color_muted), TextAlign::TOP_CENTER, "--.--");
      }

      it.printf(5, 88, id(font_label), id(color_muted), TextAlign::TOP_LEFT, "Probe mV");

      if (id(wifi_rssi).has_state()) {
        it.printf(5, 132, id(font_label), id(color_text), TextAlign::BOTTOM_LEFT, "WiFi: %d dBm", (int)id(wifi_rssi).state);
      }