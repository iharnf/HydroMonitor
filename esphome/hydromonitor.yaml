substitutions:
  device_name: hydromonitor
  friendly_name: HydroMonitor
  ph_adc_pin: GPIO36
  setup_ap_password: hydromonitor
  # –Ъ–∞–ї–Є–±—А–Њ–≤–Ї–∞ pH вАФ –њ–Њ–і—Б—В—А–Њ–є –њ–Њ–і —Б–≤–Њ–Є –±—Г—Д–µ—А–љ—Л–µ —А–∞—Б—В–≤–Њ—А—Л
  ph_cal_midpoint: "2500.0"     # mV –њ—А–Є pH 7.0 (–Є–Ј–Љ–µ—А—М –≤ —А–∞—Б—В–≤–Њ—А–µ pH 7.0)
  ph_cal_slope: "59.16"         # mV/pH (—В–µ–Њ—А–µ—В–Є—З–µ—Б–Ї–Є–є, –њ–Њ–і—Б—В—А–Њ–є –њ–Њ pH 4.0)

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "HydroMonitor v0.2.0 вАФ pH, —В–µ–Љ–њ–µ—А–∞—В—Г—А–∞, —Ж–≤–µ—В–Њ–≤–Њ–є –і–Є—Б–њ–ї–µ–є"
  project:
    name: hydromonitor.ph_monitor
    version: "0.2.0"
  on_boot:
    priority: -100
    then:
      - output.turn_on: power_hold

esp32:
  board: m5stick-c
  framework:
    type: arduino

output:
  - platform: gpio
    pin: GPIO4
    id: power_hold

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HydroMonitor Setup"
    password: ${setup_ap_password}

captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: true
  local: true

# === SPI –і–ї—П –і–Є—Б–њ–ї–µ—П ===
spi:
  clk_pin: GPIO13
  mosi_pin: GPIO15

# === OneWire –і–ї—П DS18B20 ===
one_wire:
  - platform: gpio
    pin: GPIO32
    id: onewire_bus

# === –®—А–Є—Д—В—Л ===
font:
  - file: "gfonts://Roboto Condensed"
    id: font_status
    size: 14
    glyphs: ' !"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ¬∞–Р–С–Т–У–Ф–Х–Ц–Ч–Ш–Щ–Ъ–Ы–Ь–Э–Ю–Я–†–°–Ґ–£–§–•–¶–І–®–©–™–Ђ–ђ–≠–Ѓ–ѓ–∞–±–≤–≥–і–µ–ґ–Ј–Є–є–Ї–ї–Љ–љ–Њ–њ—А—Б—В—Г—Д—Е—Ж—З—И—Й—К—Л—М—Н—О—П'
  - file: "gfonts://Roboto Condensed"
    id: font_header
    size: 14
    glyphs: ' !"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ¬∞–Р–С–Т–У–Ф–Х–Ц–Ч–Ш–Щ–Ъ–Ы–Ь–Э–Ю–Я–†–°–Ґ–£–§–•–¶–І–®–©–™–Ђ–ђ–≠–Ѓ–ѓ–∞–±–≤–≥–і–µ–ґ–Ј–Є–є–Ї–ї–Љ–љ–Њ–њ—А—Б—В—Г—Д—Е—Ж—З—И—Й—К—Л—М—Н—О—П'
  - file: "gfonts://Roboto Condensed"
    id: font_ph
    size: 52
    glyphs: ' -.0123456789'
  - file: "gfonts://Roboto Condensed"
    id: font_data
    size: 14
    glyphs: ' !"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ¬∞–Р–С–Т–У–Ф–Х–Ц–Ч–Ш–Щ–Ъ–Ы–Ь–Э–Ю–Я–†–°–Ґ–£–§–•–¶–І–®–©–™–Ђ–ђ–≠–Ѓ–ѓ–∞–±–≤–≥–і–µ–ґ–Ј–Є–є–Ї–ї–Љ–љ–Њ–њ—А—Б—В—Г—Д—Е—Ж—З—И—Й—К—Л—М—Н—О—П'

# === –¶–≤–µ—В–∞ ===
color:
  - id: color_bg
    red: 0%
    green: 0%
    blue: 0%
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_gray
    red: 50%
    green: 50%
    blue: 50%
  - id: color_green
    red: 23%
    green: 85%
    blue: 45%
  - id: color_yellow
    red: 100%
    green: 85%
    blue: 10%
  - id: color_red
    red: 95%
    green: 15%
    blue: 15%
  - id: color_cyan
    red: 0%
    green: 82%
    blue: 100%
  - id: color_cyan_dim
    red: 0%
    green: 60%
    blue: 75%

# === –Ф–∞—В—З–Є–Ї–Є ===
sensor:
  # –Э–∞–њ—А—П–ґ–µ–љ–Є–µ —Б PH-4502C
  - platform: adc
    id: ph_probe_voltage
    name: "Probe Voltage"
    pin: ${ph_adc_pin}
    attenuation: 12db
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "mV"
    device_class: voltage
    state_class: measurement
    filters:
      - median:
          window_size: 7
          send_every: 15
      - sliding_window_moving_average:
          window_size: 20
          send_every: 20
      - lambda: return x * 1000.0;

  # –†–∞—Б—З—С—В pH –Є–Ј –љ–∞–њ—А—П–ґ–µ–љ–Є—П
  - platform: template
    id: ph_value
    name: "pH Level"
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    device_class: ph
    state_class: measurement
    update_interval: 1s
    lambda: |-
      if (!id(ph_probe_voltage).has_state()) return NAN;
      float mv = id(ph_probe_voltage).state;
      float cal_mid = ${ph_cal_midpoint};
      float cal_slope = ${ph_cal_slope};
      float ph = 7.0 - (mv - cal_mid) / cal_slope;
      if (ph < 0.0 || ph > 14.0) return NAN;
      return ph;

  # –Ґ–µ–Љ–њ–µ—А–∞—В—Г—А–∞ –≤–Њ–і—Л DS18B20
  - platform: dallas_temp
    id: water_temp
    name: "Water Temperature"
    one_wire_id: onewire_bus
    unit_of_measurement: "¬∞C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    update_interval: 10s
    filters:
      - median:
          window_size: 5
          send_every: 10

  # WiFi RSSI
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi RSSI"
    update_interval: 60s
    entity_category: diagnostic
    device_class: signal_strength

# === –Ю–њ—А–µ–і–µ–ї–µ–љ–Є–µ —Б—В–∞—В—Г—Б–∞ pH ===
text_sensor:
  - platform: template
    id: ph_status
    name: "pH Status"
    update_interval: 1s
    lambda: |-
      if (!id(ph_value).has_state()) return "---";
      float ph = id(ph_value).state;
      if (ph < 5.4) return "–Ґ–†–Х–Т–Ю–У–Р";
      if (ph < 5.7) return "–Т–Э–Ш–Ь–Р–Э–Ш–Х";
      return "–Э–Ю–†–Ь–Р";
    icon: "mdi:alert-circle-outline"

# === –Ф–Є—Б–њ–ї–µ–є ===
display:
  - platform: st7789v
    id: lcd
    model: Custom
    cs_pin: GPIO5
    dc_pin: GPIO14
    reset_pin: GPIO12
    backlight_pin: GPIO27
    width: 135
    height: 240
    offset_width: 52
    offset_height: 40
    rotation: 270
    update_interval: 250ms
    lambda: |-
      // --- —Д–Њ–љ ---
      it.fill(id(color_bg));

      // --- —З–Є—В–∞–µ–Љ –і–∞–љ–љ—Л–µ ---
      float ph = id(ph_value).has_state() ? id(ph_value).state : NAN;
      float temp = id(water_temp).has_state() ? id(water_temp).state : NAN;
      float mv = id(ph_probe_voltage).has_state() ? id(ph_probe_voltage).state : NAN;
      float rssi = id(wifi_rssi).has_state() ? id(wifi_rssi).state : NAN;
      std::string status = id(ph_status).has_state() ? id(ph_status).state : "----";

      // --- –Њ–њ—А–µ–і–µ–ї—П–µ–Љ —Ж–≤–µ—В pH ---
      Color ph_color;
      Color status_color;
      bool is_alarm = false;

      if (isnan(ph)) {
        ph_color = id(color_gray);
        status_color = id(color_gray);
      } else if (ph < 5.4) {
        ph_color = id(color_red);
        status_color = id(color_red);
        is_alarm = true;
      } else if (ph < 5.7) {
        ph_color = id(color_yellow);
        status_color = id(color_yellow);
      } else {
        ph_color = id(color_green);
        status_color = id(color_green);
      }

      // --- –Љ–Є–≥–∞–љ–Є–µ –њ—А–Є —В—А–µ–≤–Њ–≥–µ (500ms) ---
      bool blink_on = (millis() / 500) % 2 == 0;

      // --- —А–Є—Б—Г–µ–Љ (–њ–Њ—А—В—А–µ—В 135√Ч240, –Ї–∞–Ї –љ–∞ —Б–Ї—А–Є–љ—И–Њ—В–µ) ---

      // –Т–µ—А—Е–љ—П—П —Б—В—А–Њ–Ї–∞: —Б—В–∞—В—Г—Б —Б–ї–µ–≤–∞ (–Э–Ю–†–Ь–Р/–Т–Э–Ш–Ь–Р–Э–Ш–Х/–Ґ–†–Х–Т–Ю–У–Р)
      it.printf(3, 2, id(font_status), status_color, TextAlign::TOP_LEFT, "%s", status.c_str());

      // "HYDROPONIC" вАФ cyan –њ–Њ —Ж–µ–љ—В—А—Г
      it.printf(67, 20, id(font_header), id(color_cyan), TextAlign::TOP_CENTER, "HYDROPONIC");

      // –С–Њ–ї—М—И–Њ–µ –Ј–љ–∞—З–µ–љ–Є–µ pH вАФ —Ж–µ–љ—В—А
      if (isnan(ph)) {
        it.printf(67, 42, id(font_ph), id(color_gray), TextAlign::TOP_CENTER, "--.--");
      } else if (is_alarm && !blink_on) {
        it.printf(67, 42, id(font_ph), id(color_bg), TextAlign::TOP_CENTER, "%.2f", ph);
      } else {
        it.printf(67, 42, id(font_ph), ph_color, TextAlign::TOP_CENTER, "%.2f", ph);
      }

      // –С–ї–Њ–Ї –і–∞–љ–љ—Л—Е (–Ї–∞–Ї –љ–∞ —Б–Ї—А–Є–љ—И–Њ—В–µ вАФ —Б—В–Њ–ї–±–Є–Ї —Б–ї–µ–≤–∞)
      int data_y = 104;
      int line_h = 16;

      // –Ґ–µ–Љ–њ–µ—А–∞—В—Г—А–∞
      if (!isnan(temp)) {
        it.printf(5, data_y, id(font_data), id(color_white), TextAlign::TOP_LEFT, "%.1f¬∞C", temp);
      } else {
        it.printf(5, data_y, id(font_data), id(color_gray), TextAlign::TOP_LEFT, "--.-¬∞C");
      }
      data_y += line_h;

      // mV
      if (!isnan(mv)) {
        it.printf(5, data_y, id(font_data), id(color_white), TextAlign::TOP_LEFT, "%.0fmV", mv);
      } else {
        it.printf(5, data_y, id(font_data), id(color_gray), TextAlign::TOP_LEFT, "----mV");
      }
      data_y += line_h;

      // WiFi
      if (!isnan(rssi)) {
        it.printf(5, data_y, id(font_data), id(color_cyan), TextAlign::TOP_LEFT, "%.0f dBm", rssi);
      } else {
        it.printf(5, data_y, id(font_data), id(color_gray), TextAlign::TOP_LEFT, "-- dBm");
      }
      data_y += line_h;

      // USB POWER
      it.printf(5, data_y, id(font_data), id(color_white), TextAlign::TOP_LEFT, "USB POWER");
