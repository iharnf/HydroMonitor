substitutions:
  device_name: hydromonitor
  friendly_name: HydroMonitor
  ph_adc_pin: GPIO36
  setup_ap_password: hydromonitor
  # Калибровка pH — подстрой под свои буферные растворы
  ph_cal_midpoint: "2610"       # mV при pH 7.0 (измерено в буфере pH 7.0)
  ph_cal_slope: "156.67"        # mV/pH (измерено: (3080-2610)/3)

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "HydroMonitor v0.2.0 — pH, температура, цветовой дисплей"
  project:
    name: hydromonitor.ph_monitor
    version: "0.2.0"
  on_boot:
    priority: -100
    then:
      - output.turn_on: power_hold

esp32:
  board: m5stick-c
  framework:
    type: arduino

output:
  - platform: gpio
    pin: GPIO4
    id: power_hold

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HydroMonitor Setup"
    password: ${setup_ap_password}

captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: true
  local: true

# === SPI для дисплея ===
spi:
  clk_pin: GPIO13
  mosi_pin: GPIO15

# === OneWire для DS18B20 ===
one_wire:
  - platform: gpio
    pin: GPIO32
    id: onewire_bus

# === Шрифты ===
font:
  - file: "gfonts://Roboto Condensed"
    id: font_status
    size: 16
    glyphs: ' !"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz°АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдежзийклмнопрстуфхцчшщъыьэюя'
  - file: "gfonts://Roboto Condensed"
    id: font_header
    size: 14
    glyphs: ' !"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz°АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдежзийклмнопрстуфхцчшщъыьэюя'
  - file: "gfonts://Roboto Condensed"
    id: font_ph
    size: 62
    glyphs: ' -.0123456789'
  - file: "gfonts://Roboto Condensed"
    id: font_data
    size: 22
    glyphs: ' !"%()+,-_.:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz°АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдежзийклмнопрстуфхцчшщъыьэюя'

# === Цвета ===
color:
  - id: color_bg
    red: 0%
    green: 0%
    blue: 0%
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_gray
    red: 50%
    green: 50%
    blue: 50%
  - id: color_green
    red: 23%
    green: 85%
    blue: 45%
  - id: color_yellow
    red: 100%
    green: 85%
    blue: 10%
  - id: color_red
    red: 95%
    green: 15%
    blue: 15%
  - id: color_cyan
    red: 0%
    green: 85%
    blue: 100%
  - id: color_orange
    red: 100%
    green: 65%
    blue: 15%

# === Датчики ===
sensor:
  # Напряжение с PH-4502C
  - platform: adc
    id: ph_probe_voltage
    name: "Probe Voltage"
    pin: ${ph_adc_pin}
    attenuation: 12db
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "mV"
    device_class: voltage
    state_class: measurement
    filters:
      - median:
          window_size: 15
          send_every: 1
      - lambda: return x * 1000.0;

  # Расчёт pH из напряжения
  - platform: template
    id: ph_value
    name: "pH Level"
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    device_class: ph
    state_class: measurement
    update_interval: 1s
    lambda: |-
      if (!id(ph_probe_voltage).has_state()) return NAN;
      float mv = id(ph_probe_voltage).state;
      float cal_mid = ${ph_cal_midpoint};
      float cal_slope = ${ph_cal_slope};
      float ph = 7.0 - (mv - cal_mid) / cal_slope;
      if (ph < 0.0 || ph > 14.0) return NAN;
      return roundf(ph * 100.0f) / 100.0f;
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  # Температура воды DS18B20
  - platform: dallas_temp
    id: water_temp
    name: "Water Temperature"
    one_wire_id: onewire_bus
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    update_interval: 10s
    filters:
      - median:
          window_size: 5
          send_every: 10

  # WiFi RSSI
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi RSSI"
    update_interval: 60s
    entity_category: diagnostic
    device_class: signal_strength

# === Определение статуса pH ===
text_sensor:
  - platform: template
    id: ph_status
    name: "pH Status"
    update_interval: 1s
    lambda: |-
      if (!id(ph_value).has_state()) return "---";
      float ph = id(ph_value).state;
      if (ph < 5.4) return "ТРЕВОГА";
      if (ph < 5.7) return "ВНИМАНИЕ";
      return "НОРМА";
    icon: "mdi:alert-circle-outline"

# === Кнопки M5StickC Plus2 ===
binary_sensor:
  - platform: gpio
    id: button_a
    pin: GPIO37
  - platform: gpio
    id: button_b
    pin: GPIO39
    on_press:
      then:
        - logger.log: "Button B pressed"

# === Дисплей ===
display:
  - platform: st7789v
    id: lcd
    model: Custom
    cs_pin: GPIO5
    dc_pin: GPIO14
    reset_pin: GPIO12
    backlight_pin: GPIO27
    width: 135
    height: 240
    offset_width: 52
    offset_height: 40
    rotation: 0
    update_interval: 1s
    lambda: |-
      it.fill(id(color_bg));

      int cx = it.get_width() / 2;

      float ph = id(ph_value).has_state() ? id(ph_value).state : NAN;
      float temp = id(water_temp).has_state() ? id(water_temp).state : NAN;
      float mv = id(ph_probe_voltage).has_state() ? id(ph_probe_voltage).state : NAN;
      float rssi = id(wifi_rssi).has_state() ? id(wifi_rssi).state : NAN;
      std::string status = id(ph_status).has_state() ? id(ph_status).state : "----";

      Color ph_color, st_color;
      if (isnan(ph)) { ph_color = id(color_gray); st_color = id(color_gray); }
      else if (ph < 5.4) { ph_color = id(color_red); st_color = id(color_red); }
      else if (ph < 5.7) { ph_color = id(color_yellow); st_color = id(color_yellow); }
      else { ph_color = id(color_green); st_color = id(color_green); }

      // ==== Всё по центру, крупно ====

      // HYDROPONIC — cyan вверху
      it.printf(cx, 0, id(font_header), id(color_cyan), TextAlign::TOP_CENTER, "HYDROPONIC");

      // Статус — центрирован, строкой ниже
      it.printf(cx, 18, id(font_status), st_color, TextAlign::TOP_CENTER, "%s", status.c_str());

      // pH — всегда видимое, без мигания
      if (isnan(ph))
        it.printf(cx, 40, id(font_ph), id(color_gray), TextAlign::TOP_CENTER, "--.--");
      else
        it.printf(cx, 38, id(font_ph), ph_color, TextAlign::TOP_CENTER, "%.2f", ph);

      // Температура — оранжевая
      if (!isnan(temp))
        it.printf(cx, 128, id(font_data), id(color_orange), TextAlign::TOP_CENTER, "%.1f°C", temp);
      else
        it.printf(cx, 128, id(font_data), id(color_gray), TextAlign::TOP_CENTER, "--.-°C");

      // mV — белая
      if (!isnan(mv))
        it.printf(cx, 155, id(font_data), id(color_white), TextAlign::TOP_CENTER, "%.0fmV", mv);
      else
        it.printf(cx, 155, id(font_data), id(color_gray), TextAlign::TOP_CENTER, "----mV");

      // Сигнал — cyan
      if (!isnan(rssi))
        it.printf(cx, 182, id(font_data), id(color_cyan), TextAlign::TOP_CENTER, "%.0f dBm", rssi);
      else
        it.printf(cx, 182, id(font_data), id(color_gray), TextAlign::TOP_CENTER, "-- dBm");
