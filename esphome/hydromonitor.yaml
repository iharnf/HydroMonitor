substitutions:
  device_name: hydromonitor
  friendly_name: HydroMonitor
  ph_adc_pin: GPIO36
  display_spi_clk: GPIO13
  display_spi_mosi: GPIO15
  display_cs: GPIO5
  display_dc: GPIO23
  display_reset: GPIO18
  display_backlight: GPIO27
  setup_ap_password: hydromonitor

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "HydroMonitor diagnostic firmware, v0.1.1"
  project:
    name: hydromonitor.ph_monitor
    version: "0.1.1"

esp32:
  board: m5stick-c
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HydroMonitor Setup"
    password: ${setup_ap_password}

captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: true
  local: true

time:
  - platform: homeassistant
    id: homeassistant_time

# Display is temporarily disabled in v0.1.1.
# Goal: confirm that Wi-Fi, API, web_server and ADC are stable first.
# After that we will enable the M5StickC Plus2 ST7789 display with verified pins.

globals:
  - id: ph_ready
    type: bool
    restore_value: no
    initial_value: "false"

sensor:
  - platform: adc
    id: ph_probe_voltage
    name: "Probe Voltage"
    pin: ${ph_adc_pin}
    attenuation: 12db
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "mV"
    device_class: voltage
    state_class: measurement
    filters:
      - median:
          window_size: 7
          send_every: 3
          send_first_at: 1
      - sliding_window_moving_average:
          window_size: 20
          send_every: 5
          send_first_at: 1
      - lambda: return x * 1000.0;

  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi RSSI"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    id: device_uptime
    name: "Uptime"
    update_interval: 60s
    entity_category: diagnostic

  # DS18B20 будет добавлен в v0.3.0.
  # План подключения:
  #   DATA -> GPIO32
  #   VCC  -> 5V
  #   GND  -> GND
  #   резистор 4.7 кОм между DATA и VCC
  #
  # - platform: dallas_temp
  #   id: water_temperature
  #   name: "Water Temperature"
  #   update_interval: 30s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic

binary_sensor:
  - platform: status
    name: "Status"

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

  - platform: template
    name: "Calibration Placeholder"
    entity_category: config
    on_press:
      - logger.log: "Calibration will be implemented in v0.2.0 after real mV values are verified."

interval:
  - interval: 10s
    then:
      - logger.log:
          format: "HydroMonitor alive. Probe voltage: %.0f mV"
          args: [ 'id(ph_probe_voltage).state' ]
